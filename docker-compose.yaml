services:
  mongodb:
    image: mongo
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=chatbot
      - MONGO_INITDB_ROOT_PASSWORD=chatbot

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=chatbot
      - ME_CONFIG_MONGODB_ADMINPASSWORD=chatbot
      - ME_CONFIG_MONGODB_SERVER=mongodb

  chat-app:
    build: .
    container_name: chat-backend
    ports:
      - "8080:8088"
    depends_on:
      - mongodb
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://chatbot:chatbot@mongodb:27017/chatdb?authSource=admin

volumes:
  mongo: {}